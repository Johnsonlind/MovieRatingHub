<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logos/home.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  
    <!-- ====== GA4 跟踪代码开始 ====== -->
    <script>
      (function() {
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;

        function loadGA() {
          if (window.__gaLoaded) return;
          window.__gaLoaded = true;

          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-J2305JG26B';
          script.onload = function() {
            gtag('js', new Date());
            gtag('config', 'G-J2305JG26B');
          };
          document.head.appendChild(script);
        }

        if (document.readyState === 'complete') {
          loadGA();
        } else {
          window.addEventListener('load', loadGA);
          setTimeout(loadGA, 5000);
        }
      })();
    </script>
    <!-- ====== GA4 跟踪代码结束 ====== -->
    
    <!-- iOS Safari 状态栏样式 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0e1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f9ff" media="(prefers-color-scheme: light)" />
    <title>Ratefuse 搜索并对比多平台影视评分</title>
    
    <!-- DNS预解析和预连接 -->
    <link rel="dns-prefetch" href="//image.tmdb.org">
    <link rel="preconnect" href="//image.tmdb.org" crossorigin="anonymous">
    <meta http-equiv="x-dns-prefetch-control" content="on">
    
    <!-- 使用系统默认字体 -->
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
      }
      
      body {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-synthesis: none;
      }
    </style>
    
    <!-- 主题初始化脚本 -->
    <script>
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
